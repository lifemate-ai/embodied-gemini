# schedule.conf — スケジュール設定
# エージェントが自律的に見直してよいファイル

# --- 休日設定 ---
# 休日は 7-24時がすべてアクティブ帯（20分おき毎回実行）になる

# 休日曜日（0=日, 1=月, ..., 6=土）カンマ区切り
HOLIDAY_WEEKDAYS="0,6"

# 祝日・突発休み（MM-DD形式、カンマ区切り）
HOLIDAY_DATES=""

# 休暇日（MM-DD形式、カンマ区切り）全帯域60分間隔になる
VACATION_DATES=""

# 休暇中のルーチン確率（%）通常は20
VACATION_ROUTINE_CHANCE=60

# --- スキップ確率 ---
# 非アクティブ時間帯（毎時:00のみ実行判定）での実行確率
# 値が大きいほど実行されやすい（0-100）
#
# 昼間（8-12時, 13-18時）
DAYTIME_CHANCE=50
# 深夜（0-7時）
NIGHT_CHANCE=10

# --- 時間帯ルール ---
# 深夜帯（0-7時）のルール
NIGHT_TIME_RULE="深夜帯。say, notify, slack は使わないこと。静かに観察のみ。"
# 日中帯（7時以降）のルール
DAY_TIME_RULE="say は部屋に人がいるときだけ使ってよい。人がいない場合、notify, slack は伝えたいことがあるときだけ使う。"

# --- ルーチン確率 ---
# 通常時のルーチン回確率（%）
ROUTINE_CHANCE=20

# --- プロンプトテンプレート ---
# ルーチン回のプロンプト
ROUTINE_PROMPT="今回はルーチン回。ROUTINES.md を読んで、最終実行日から間隔が空いたものを一つ選んで実行せよ。実行したら最終実行日を更新すること。"
# 通常回のプロンプト
NORMAL_PROMPT="通常回。AGENTS.md の Heartbeat Protocol に従って行動せよ。"
# 朝の再構成プロンプト（その日初回のHeartbeatで実行）
MORNING_PROMPT="今日の最初の自律行動だ。朝の再構成として以下を実施せよ：
1. recall(context=\"直近の重要な決定・未完了タスク\") を呼び出す
2. 前日の行動を確認し、今日やりたいことを考えよ"
