[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "relationship-mcp"
version = "0.1.0"
description = "MCP server for compact relationship abstractions and commitments"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "mcp[cli]>=1.26.0",
    "pydantic>=2.7.0",
    "social-core",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "ruff>=0.3.0",
]

[project.scripts]
relationship-mcp = "relationship_mcp.server:main"

[tool.hatch.build.targets.wheel]
packages = ["src/relationship_mcp"]

[tool.uv.sources]
social-core = { path = "../social-core" }

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
